<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三国武将录 - 后台统计</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      color: #e0c097;
      font-family: "Microsoft YaHei", "SimHei", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    h1 {
      color: #c4a24e;
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(196, 162, 78, 0.3);
    }

    h2 {
      color: #c4a24e;
      font-size: 20px;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(196, 162, 78, 0.3);
      padding-bottom: 8px;
    }

    /* 登录区 */
    #login-screen {
      text-align: center;
      margin-top: 15vh;
    }

    #login-screen .login-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(196, 162, 78, 0.3);
      border-radius: 8px;
      padding: 40px;
      display: inline-block;
      min-width: 350px;
    }

    #login-screen label {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
    }

    #login-screen input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid rgba(196, 162, 78, 0.4);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.3);
      color: #e0c097;
      outline: none;
      margin-bottom: 15px;
    }

    #login-screen input[type="password"]:focus {
      border-color: #c4a24e;
    }

    #login-screen button {
      padding: 10px 30px;
      font-size: 16px;
      background: #c4a24e;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    #login-screen button:hover {
      background: #d4b45e;
    }

    #login-error {
      color: #e74c3c;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    /* 统计区 */
    #stats-screen {
      display: none;
      width: 100%;
      max-width: 900px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(196, 162, 78, 0.2);
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .total-number {
      font-size: 64px;
      font-weight: bold;
      color: #c4a24e;
      text-align: center;
      text-shadow: 0 0 15px rgba(196, 162, 78, 0.4);
    }

    .total-label {
      text-align: center;
      font-size: 16px;
      margin-top: 5px;
      opacity: 0.8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(196, 162, 78, 0.15);
    }

    th {
      color: #c4a24e;
      font-weight: bold;
      font-size: 14px;
      text-transform: uppercase;
    }

    td {
      font-size: 14px;
    }

    tr:hover td {
      background: rgba(196, 162, 78, 0.05);
    }

    .refresh-btn {
      display: inline-block;
      padding: 8px 20px;
      font-size: 14px;
      background: transparent;
      color: #c4a24e;
      border: 1px solid #c4a24e;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .refresh-btn:hover {
      background: rgba(196, 162, 78, 0.1);
    }
  </style>
</head>
<body>

  <!-- 登录区 -->
  <div id="login-screen">
    <div class="login-box">
      <h1>三国武将录 - 后台统计</h1>
      <label for="password-input">请输入管理密码</label>
      <input type="password" id="password-input" placeholder="密码" autofocus>
      <br>
      <button id="login-btn">进入后台</button>
      <div id="login-error">密码错误</div>
    </div>
  </div>

  <!-- 统计区 -->
  <div id="stats-screen">
    <h1>三国武将录 - 后台统计</h1>
    <button class="refresh-btn" id="refresh-btn">刷新数据</button>

    <div class="stat-card">
      <div class="total-number" id="total-games">0</div>
      <div class="total-label">总游戏次数</div>
    </div>

    <div class="stat-card">
      <h2>各结局达成次数</h2>
      <table>
        <thead>
          <tr><th>结局</th><th>次数</th></tr>
        </thead>
        <tbody id="ending-table-body"></tbody>
      </table>
    </div>

    <div class="stat-card">
      <h2>各角色选择次数</h2>
      <table>
        <thead>
          <tr><th>角色</th><th>次数</th></tr>
        </thead>
        <tbody id="character-table-body"></tbody>
      </table>
    </div>

    <div class="stat-card">
      <h2>最近 50 条记录</h2>
      <table>
        <thead>
          <tr><th>玩家</th><th>角色</th><th>结局</th><th>时间</th></tr>
        </thead>
        <tbody id="recent-table-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    let currentPassword = '';

    // 角色 ID → 中文名映射
    const characterNames = {
      farmer: '农夫之子', scholar: '寒门书生', soldier: '行伍士卒',
      wanderer: '江湖游侠', merchant: '商贾之子', craftsman: '匠人学徒'
    };

    // 结局 ID → 中文名映射
    const endingNames = {
      death_illness: '病殁沙场', death_assassinated: '遇刺身亡',
      death_battle: '马革裹尸', death_executed: '身首异处',
      unify: '一统天下', wei_minister: '魏国重臣',
      shu_guardian: '蜀汉柱石', wu_admiral: '东吴都督',
      benevolent: '仁主中兴', strategist: '幕后军师',
      invincible: '天下无双', martyr: '以身殉道',
      loyal: '忠臣良将', chancellor: '权臣专政',
      warlord: '乱世枭雄', hermit: '归隐山林',
      fallen: '战死沙场', bandit: '落草为寇',
      betrayed: '众叛亲离', ordinary: '平凡一生'
    };

    function charName(id) { return characterNames[id] || id; }
    function endName(id) { return endingNames[id] || id; }

    const loginScreen = document.getElementById('login-screen');
    const statsScreen = document.getElementById('stats-screen');
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');
    const refreshBtn = document.getElementById('refresh-btn');

    async function fetchStats(password) {
      const res = await fetch('/api/stats?password=' + encodeURIComponent(password));
      if (!res.ok) {
        throw new Error('密码错误');
      }
      return res.json();
    }

    function renderStats(data) {
      document.getElementById('total-games').textContent = data.totalGames;

      const endingBody = document.getElementById('ending-table-body');
      endingBody.innerHTML = data.endingCounts.map(function(row) {
        return '<tr><td>' + escapeHtml(endName(row.ending_id)) + '</td><td>' + row.count + '</td></tr>';
      }).join('');

      const charBody = document.getElementById('character-table-body');
      charBody.innerHTML = data.characterCounts.map(function(row) {
        return '<tr><td>' + escapeHtml(charName(row.character_id)) + '</td><td>' + row.count + '</td></tr>';
      }).join('');

      const recentBody = document.getElementById('recent-table-body');
      recentBody.innerHTML = data.recentRecords.map(function(row) {
        return '<tr><td>' + escapeHtml(row.player_name) + '</td><td>' + escapeHtml(charName(row.character_id)) + '</td><td>' + escapeHtml(endName(row.ending_id)) + '</td><td>' + escapeHtml(row.created_at) + '</td></tr>';
      }).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function doLogin() {
      const password = passwordInput.value.trim();
      if (!password) return;

      try {
        const data = await fetchStats(password);
        currentPassword = password;
        loginScreen.style.display = 'none';
        statsScreen.style.display = 'block';
        renderStats(data);
      } catch (err) {
        loginError.style.display = 'block';
      }
    }

    loginBtn.addEventListener('click', doLogin);

    passwordInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        doLogin();
      }
    });

    refreshBtn.addEventListener('click', async function() {
      try {
        const data = await fetchStats(currentPassword);
        renderStats(data);
      } catch (err) {
        alert('刷新失败');
      }
    });
  </script>
</body>
</html>
